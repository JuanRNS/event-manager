<div class="main-content">
  <div class="page-header">
    <h1 class="page-title">Painel de Relatórios</h1>
    <button class="btn btn-primary" [class.disabled]="true" title="Funcionalidade em desenvolvimento">
      <mat-icon fontIcon="description"></mat-icon>
      Gerar Relatório Geral
    </button>
  </div>

  <div class="filter-section">
    <app-form [form]="form" [group]="formGroupItens"></app-form>
    <div class="search-bar">
      <button mat-button class="btn btn-primary" (click)="getDashBoardFromTo()">
        <mat-icon fontIcon="search"></mat-icon>
        Buscar
      </button>
      @if(isFilteringByDate) {
      <button mat-button class="btn btn-secondary btn-clear" (click)="getListDashboard()">
        <mat-icon fontIcon="clear"></mat-icon>
        Limpar Filtro
      </button>
      }
    </div>
  </div>

  <app-dashboard [listDashboard]="listDashboard" [totalElements]="totalElements" [pageSize]="pageSize"
    (pageChange)="onPageChange($event)" (download)="downloadReport($event.id, $event.name)"></app-dashboard>
</div>
