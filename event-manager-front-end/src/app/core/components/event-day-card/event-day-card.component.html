<div class="event-card" [class]="getStatusClass()">

  <div class="event-card__header">
    <div class="event-card__title-group">
      <mat-icon class="event-card__icon" fontIcon="celebration"></mat-icon>
      <h3 class="event-card__title">{{ event().nameClient }}</h3>
    </div>
    <span class="event-card__badge" [class]="getStatusClass()">
      {{ getStatusLabel() }}
    </span>
  </div>

  <div class="event-card__body">
    <div class="event-card__info-row">
      <mat-icon class="event-card__info-icon" fontIcon="schedule"></mat-icon>
      <span class="event-card__info-text">{{ event().hourStart }} – {{ event().hourEnd }}</span>
    </div>

    <div class="event-card__info-row">
      <mat-icon class="event-card__info-icon" fontIcon="location_on"></mat-icon>
      <span class="event-card__info-text">{{ event().location }}</span>
    </div>
  </div>

  <div class="event-card__footer">
    <button class="btn btn-outline event-card__btn" (click)="onViewDetails()">
      <mat-icon fontIcon="visibility"></mat-icon>
      Ver detalhes
    </button>
    <button class="btn btn-primary event-card__btn" (click)="onEditEvent()">
      <mat-icon fontIcon="edit"></mat-icon>
      Editar
    </button>
  </div>

</div>
