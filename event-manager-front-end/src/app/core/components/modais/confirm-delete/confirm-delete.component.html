<mat-dialog-content class="modal-container">
    <div class="modal-container">
        <h2>Confirmar exclusão?</h2>
        <p>Tem certeza que deseja excluir este item?</p>

        <div class="button-group">
            <button mat-button class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
            <button mat-button class="btn btn-primary" (click)="onConfirm()">Confirmar</button>
        </div>
    </div>
</mat-dialog-content>
